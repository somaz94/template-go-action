name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify go.mod is tidy
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "FAIL: go.mod or go.sum is not tidy"
            exit 1
          fi

      - name: Run go vet
        run: go vet ./...

      - name: Run go fmt check
        run: |
          if [ -n "$(gofmt -l .)" ]; then
            echo "Code is not formatted. Run 'gofmt -s -w .'"
            gofmt -d .
            exit 1
          fi

      - name: Run tests with coverage
        run: go test ./... -v -cover -coverprofile=coverage.out

      - name: Display coverage summary
        run: go tool cover -func=coverage.out

  build-docker:
    name: Build and Test Docker
    needs: unit-tests
    runs-on: ubuntu-latest
    services:
      registry:
        image: registry:2
        ports:
          - 5001:5000
    env:
      TEST_TAG: localhost:5001/actions/myaction:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Docker BuildX
        uses: docker/setup-buildx-action@v4
        with:
          install: true
          driver-opts: network=host

      - name: Build the Container
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.TEST_TAG }}

      - name: Run the Container (dry-run)
        run: |
          docker run \
            --env INPUT_OUTPUT_FILE="output.txt" \
            --env INPUT_DRY_RUN="true" \
            --rm ${{ env.TEST_TAG }}

  test-action:
    name: Action Integration Test
    needs: build-docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Test Local Action (dry-run)
        id: test-action
        uses: ./
        with:
          output_file: output.txt
          dry_run: 'true'

      - name: Verify Output
        run: |
          if [ -z "${{ steps.test-action.outputs.output_file }}" ]; then
            echo "FAIL: output_file output is empty"
            exit 1
          fi
          echo "PASS: action outputs verified"

  ci-result:
    name: CI Result
    if: always()
    needs:
      - unit-tests
      - build-docker
      - test-action
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || \
             [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "[FAIL] Some jobs failed or were cancelled"
            exit 1
          fi
          echo "[PASS] All CI jobs passed"
